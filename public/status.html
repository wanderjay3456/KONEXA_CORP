<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="description" content="KONEXA 핵심 서비스의 실시간 연결 상태를 확인합니다." />
    <title>KONEXA 서비스 상태</title>
    <style>
      :root { color-scheme: light; font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; color: #171717; background: radial-gradient(circle at 10% 10%, #eef8ff 0, transparent 38%), radial-gradient(circle at 90% 20%, #f4f0ff 0, transparent 36%), #fafafa; }
      main { width: min(880px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 52px; }
      .brand { font-size: 15px; font-weight: 800; letter-spacing: .18em; }
      a { color: inherit; text-decoration: none; }
      .back { color: #666; font-size: 13px; }
      .panel { border: 1px solid rgba(0,0,0,.08); border-radius: 28px; padding: clamp(28px, 5vw, 52px); background: rgba(255,255,255,.86); box-shadow: 0 28px 80px rgba(30,50,80,.09); backdrop-filter: blur(18px); }
      .eyebrow { color: #737373; font-size: 12px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
      h1 { margin: 12px 0 12px; font-size: clamp(34px, 7vw, 62px); line-height: 1.03; letter-spacing: -.055em; }
      .summary { max-width: 620px; margin: 0; color: #666; font-size: 15px; line-height: 1.7; }
      .overall { display: flex; align-items: center; gap: 12px; margin: 36px 0; padding: 18px 20px; border-radius: 18px; background: #f5f5f5; font-weight: 750; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #a3a3a3; box-shadow: 0 0 0 7px rgba(163,163,163,.13); }
      .ok .dot { background: #16a36a; box-shadow: 0 0 0 7px rgba(22,163,106,.12); }
      .error .dot { background: #d94c4c; box-shadow: 0 0 0 7px rgba(217,76,76,.12); }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .item { display: flex; justify-content: space-between; gap: 20px; padding: 18px 20px; border: 1px solid #e8e8e8; border-radius: 16px; background: #fff; font-size: 13px; }
      .state { color: #737373; font-weight: 700; }
      .state.ready { color: #087a50; }
      footer { margin-top: 22px; color: #999; font-size: 12px; line-height: 1.6; }
      @media (max-width: 640px) { main { padding-top: 28px; } header { margin-bottom: 28px; } .grid { grid-template-columns: 1fr; } .panel { border-radius: 22px; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <a class="brand" href="/">KONEXA</a>
        <a class="back" href="/">서비스로 돌아가기</a>
      </header>
      <section class="panel">
        <div class="eyebrow">Service status</div>
        <h1>서비스 상태</h1>
        <p class="summary">KONEXA의 핵심 서비스 연결 상태를 실시간으로 확인합니다. 선택형 외부 서비스는 실제 계약·심사 완료 후 활성화됩니다.</p>
        <div class="overall" id="overall"><span class="dot"></span><span id="overall-text">상태를 확인하고 있습니다</span></div>
        <div class="grid" id="services" aria-live="polite"></div>
        <footer id="updated">최근 확인 시간: 확인 중</footer>
      </section>
    </main>
    <script>
      const labels = {
        supabaseAdmin: "회원·데이터 서비스",
        gemini: "AI 분석",
        email: "이메일 발송",
        stripeSubscription: "해외 구독 결제",
        portoneProjectPayments: "국내 프로젝트 결제",
        modusign: "전자서명"
      };

      async function loadStatus() {
        const overall = document.getElementById("overall");
        const overallText = document.getElementById("overall-text");
        const services = document.getElementById("services");
        const updated = document.getElementById("updated");

        try {
          const response = await fetch("/api/system-status", { headers: { Accept: "application/json" }, cache: "no-store" });
          if (!response.ok) throw new Error("status request failed");
          const data = await response.json();
          overall.classList.add("ok");
          overallText.textContent = "KONEXA 핵심 서비스가 정상 운영 중입니다";
          services.innerHTML = Object.entries(data.configuration || {}).map(([key, enabled]) => {
            const ready = Boolean(enabled);
            return `<div class="item"><span>${labels[key] || key}</span><span class="state ${ready ? "ready" : ""}">${ready ? "연결됨" : "준비 중"}</span></div>`;
          }).join("");
          updated.textContent = `최근 확인 시간: ${new Date(data.timestamp || Date.now()).toLocaleString("ko-KR")}`;
        } catch {
          overall.classList.add("error");
          overallText.textContent = "현재 상태 정보를 불러오지 못했습니다";
          services.innerHTML = "<div class=\"item\"><span>상태 API</span><span class=\"state\">재확인 필요</span></div>";
          updated.textContent = "잠시 후 새로고침해 주세요.";
        }
      }

      loadStatus();
    </script>
  </body>
</html>
